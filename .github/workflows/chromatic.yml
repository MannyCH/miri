name: Chromatic Visual Testing

on:
  workflow_dispatch:
jobs:
  chromatic:
    name: Run Chromatic Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Chromatic baseline comparison

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: 'build-storybook'
          onlyChanged: true  # Only test changed components
          exitZeroOnChanges: true  # Don't fail on visual changes (review in UI)
          exitOnceUploaded: true  # Don't wait for test results
          
      - name: Publish Storybook to Chromatic
        run: |
          echo "✅ Chromatic build complete"
          echo "📊 Review changes at: https://www.chromatic.com"
